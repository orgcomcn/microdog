services:
  db:
    image: postgres:16-alpine
    container_name: microdog-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: microdog_v1
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d microdog_v1"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: microdog-app
    working_dir: /app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/microdog_v1?schema=public
      NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: ${NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID:-replace-with-project-id}
      NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-MicroDOG V1}
      COINGECKO_API_KEY: ${COINGECKO_API_KEY:-}
      COINGECKO_API_BASE_URL: ${COINGECKO_API_BASE_URL:-https://api.coingecko.com/api/v3}
      MARKET_MICRODOGE_COINGECKO_ID: ${MARKET_MICRODOGE_COINGECKO_ID:-}
      MARKET_MICRODOGE_PLATFORM_ID: ${MARKET_MICRODOGE_PLATFORM_ID:-}
      MARKET_MICRODOGE_CONTRACT_ADDRESS: ${MARKET_MICRODOGE_CONTRACT_ADDRESS:-}
      NODE_ENV: development
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
      - /app/.next

volumes:
  postgres_data:
  app_node_modules:
