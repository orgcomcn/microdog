services:
  db:
    image: postgres:16-alpine
    container_name: microdog-postgres-prod
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-microdog_v1}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-microdog_v1}"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        DATABASE_URL: ${DATABASE_URL}
        NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: ${NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID:-demo-project-id}
        NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-MicroDOG V1}
    container_name: microdog-app-prod
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: ${NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID:-demo-project-id}
      NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-MicroDOG V1}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      COINGECKO_API_KEY: ${COINGECKO_API_KEY:-}
      COINGECKO_API_BASE_URL: ${COINGECKO_API_BASE_URL:-https://api.coingecko.com/api/v3}
      MARKET_MICRODOGE_COINGECKO_ID: ${MARKET_MICRODOGE_COINGECKO_ID:-}
      MARKET_MICRODOGE_PLATFORM_ID: ${MARKET_MICRODOGE_PLATFORM_ID:-}
      MARKET_MICRODOGE_CONTRACT_ADDRESS: ${MARKET_MICRODOGE_CONTRACT_ADDRESS:-}
    expose:
      - "3000"

  caddy:
    image: caddy:2-alpine
    container_name: microdog-caddy-prod
    restart: unless-stopped
    depends_on:
      - app
    environment:
      APP_DOMAIN: ${APP_DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  postgres_prod_data:
  caddy_data:
  caddy_config:
